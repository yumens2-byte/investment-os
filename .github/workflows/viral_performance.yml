name: 📊 Viral Performance Tracker

on:
  schedule:
    # 매 30분마다 (측정 윈도우 24h/48h/68h/80h ±15분 커버)
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force_mode:
        description: 'Force mode override (override repo VIRAL_AUTO_DELETE)'
        type: choice
        options:
          - ''
          - 'off'
          - 'monitor'
          - 'dry_run'
          - 'full'
        default: ''

# 동시 실행 방지 (cron 30분 + 수동 dispatch 충돌 방지)
concurrency:
  group: viral-performance-tracker
  cancel-in-progress: false

jobs:
  performance_check:
    name: Track + Evaluate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # 모드: workflow_dispatch input > repo Variables > policy YAML 기본값
      VIRAL_AUTO_DELETE: ${{ github.event.inputs.force_mode || vars.VIRAL_AUTO_DELETE || 'monitor' }}

      # X API
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      # Supabase
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      # Telegram (실패 알림용)
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Viral Performance Tracker
        id: tracker
        run: |
          echo "[Workflow] Mode: $VIRAL_AUTO_DELETE"
          python -m engines.viral_performance_tracker

      - name: Notify on failure (best-effort)
        if: failure()
        continue-on-error: true
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_FREE_CHANNEL_ID" ]; then
            echo "[Workflow] TG 알림 환경변수 없음 → 스킵"
            exit 0
          fi
          MSG="⚠️ [Viral Tracker] cron 실행 실패%0A시각: $(date -u +'%Y-%m-%d %H:%M UTC')%0Amode: $VIRAL_AUTO_DELETE%0A워크플로우 로그 확인 필요"
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_FREE_CHANNEL_ID}" \
            -d "text=${MSG}" || true
