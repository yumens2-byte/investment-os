name: Viral Content

on:
  schedule:
    # 기존: 오후 16:00 KST (UTC 07:00) — 평일 C-6/C-18/C-19/C-20 랜덤
    #- cron: "0 7 * * 1-5"
    # C-20 오전: KST 08:00 (UTC 23:00 전날) — 일~목 UTC = 월~금 KST
    - cron: "0 23 * * 0-6"
    # C-20 퇴근: KST 18:00 (UTC 09:00) — 평일
    #- cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      session:
        description: "viral_afternoon | C-20"
        required: false
        default: C-20

env:
  X_API_KEY: ${{ secrets.X_API_KEY }}
  X_API_SECRET: ${{ secrets.X_API_SECRET }}
  X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
  X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
  DRY_RUN: ${{ secrets.DRY_RUN }}
  FORCE_RUN: ${{ secrets.FORCE_RUN || 'false' }}
  LOG_LEVEL: INFO
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GEMINI_API_SUB_KEY: ${{ secrets.GEMINI_API_SUB_KEY }}
  GEMINI_API_SUB_SUB_KEY: ${{ secrets.GEMINI_API_SUB_SUB_KEY }}
  GEMINI_API_SUB_PAY_KEY: ${{ secrets.GEMINI_API_SUB_PAY_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  # viral_afternoon:
  #   name: Viral Afternoon (16~19 KST)
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 240
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.11"
  #         cache: pip
  #     - run: pip install -r requirements.txt
  #     - name: Install Korean fonts
  #       run: sudo apt-get install -y fonts-noto-cjk
  #     - name: Anti-bot random delay (schedule only)
  #       if: github.event_name != 'workflow_dispatch'
  #       run: |
  #         DELAY=$((RANDOM % 200))
  #         echo "⏱️ Random delay: ${DELAY}s ($((DELAY/60))m $((DELAY%60))s)"
  #         sleep $DELAY
  #     - name: Run viral content
  #       run: python -c "from engines.viral_engine import run_viral; print(run_viral('viral_afternoon'))"

  # ── C-20 극단적 선택 — 오전 08:00 KST 퇴근 18:00 KST ──────────────────────
  C-20:
    name: C-20 극단적 선택 (오전 08:00 KST 퇴근 18:00 KST)
    if: |
        github.event_name == 'workflow_dispatch' && github.event.inputs.session == 'C-20' || 
        github.event_name == 'schedule' && (github.event.schedule == '0 23 * * 0-4') || 
        github.event_name == 'schedule' && (github.event.schedule == '0 9 * * 1-5')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Anti-bot random delay (schedule only)
        if: github.event_name != 'workflow_dispatch'
        run: |
          DELAY=$((RANDOM % 100))
          echo "⏱️ Random delay: ${DELAY}s"
          sleep $DELAY
      - name: Run C-20 오전
        run: python -c "from engines.viral_engine import run_viral_c20; print(run_viral_c20('viral_c20'))"

      - name: Run viral
        run: |
          export PYTHONUNBUFFERED=1
          python -c "
          import logging
          logging.basicConfig(
              level=logging.INFO,
              format='%(asctime)s [%(levelname)s] %(name)s — %(message)s',
          )
          from engines.viral_engine import run_viral_c20
          print(run_viral_c20('viral_c20'))
          "

      - name: Upload logs and images
        if: always()   # 성공/실패 무관 업로드
        uses: actions/upload-artifact@v4
        with:
          name: viral-c20-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            logs/
            data/images/
          retention-days: 7
          if-no-files-found: warn
