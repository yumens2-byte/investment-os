name: 📚 Comic Weekly Pipeline

on:
  schedule:
    # 금요일 KST 20:00 = UTC 11:00
    - cron: '0 11 * * 4'
  workflow_dispatch:
    inputs:
      dry_run_override:
        description: 'DRY_RUN 강제 설정 (true/false)'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  comic-weekly:
    name: Weekly Comic (8컷)
    runs-on: ubuntu-latest
    timeout-minutes: 25   # 8컷 생성으로 더 긴 타임아웃

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      
      - name: Install Korean fonts
        run: sudo apt-get install -y fonts-noto-cjk
      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🎭 Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: 📚 Run Weekly Comic Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          X_API_KEY:         ${{ secrets.X_API_KEY }}
          X_API_SECRET:      ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:    ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_SUB_KEY: ${{ secrets.GEMINI_API_SUB_KEY }}
          GEMINI_API_SUB_SUB_KEY: ${{ secrets.GEMINI_API_SUB_SUB_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run_override != '' && github.event.inputs.dry_run_override || vars.DRY_RUN }}
          FORCE_RUN: ${{ secrets.FORCE_RUN || 'false' }}
        run: |
          echo "=== Weekly Comic Pipeline 시작 ==="
          echo "DRY_RUN=$DRY_RUN"
          python -m comic.pipeline --type weekly

      - name: 🚨 Notify Failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_FREE_CHANNEL_ID: ${{ secrets.TELEGRAM_FREE_CHANNEL_ID }}
        run: |
          python -m notifier.telegram \
            --message "🚨 [FAIL] Weekly Comic Pipeline 실패 — $(date '+%Y-%m-%d')"
