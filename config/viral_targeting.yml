# ============================================================================
# Investment OS — Viral Targeting Policy v1.0.0
# ----------------------------------------------------------------------------
# 작성: 2026-04-26 | GTT팀 (Architect + Lead 페어)
# 부모 모듈: engines/viral_engine.py v1.7.0
# 목적: C-20 바이럴 콘텐츠 생성/폐기 정책의 단일 진실의 원천(SSoT)
# 운영: 코드 수정/재배포 없이 다음 cron 실행부터 즉시 반영
# ============================================================================

version: "1.0.0"
updated: "2026-04-26"
maintainer: "GTT-Architect"

# ----------------------------------------------------------------------------
# 1) 타깃 세그먼트 정의 (FR-01, FR-02, FR-09)
#    - weight: 슬롯 균등 분포용 가중치 (합 = 1.0)
#    - allowed_stimulus_level: 1~5, 5가 가장 강함
# ----------------------------------------------------------------------------
segments:
  S1_20_24:
    age_range: [20, 24]
    weight: 0.20
    pain: "사회초년생, 소득 낮음, 또래 비교 압박"
    desire: "빠른 자산 형성, 또래 추월"
    allowed_stimulus_level: 4
    keywords_supportive: ["첫 월급", "주식 시작", "또래", "부모 도움"]
    numeric_range:
      salary_monthly: [200, 350]
      asset_total: [0, 5000]

  S2_25_29:
    age_range: [25, 29]
    weight: 0.25
    pain: "이직 고민, 연봉 협상, 자산 시작"
    desire: "연봉 점프, 시드 1억"
    allowed_stimulus_level: 5
    keywords_supportive: ["이직", "연봉", "시드", "코인", "주식"]
    numeric_range:
      salary_monthly: [300, 600]
      asset_total: [3000, 20000]

  S3_30_34:
    age_range: [30, 34]
    weight: 0.25
    pain: "결혼 자금, 주거 대출, 시간 부족"
    desire: "내 집 마련, 안정"
    allowed_stimulus_level: 4
    keywords_supportive: ["결혼", "전세", "주담대", "갭투자"]
    numeric_range:
      salary_monthly: [400, 800]
      asset_total: [5000, 50000]

  S4_35_39:
    age_range: [35, 39]
    weight: 0.20
    pain: "육아 비용, 커리어 정체, 시간 절대 부족"
    desire: "현금흐름 확보, 부동산 자산"
    allowed_stimulus_level: 3
    keywords_supportive: ["육아", "사교육", "현금흐름", "월세"]
    numeric_range:
      salary_monthly: [500, 1200]
      asset_total: [10000, 100000]

  S5_40_44:
    age_range: [40, 44]
    weight: 0.10
    pain: "건강, 자산 방어, 커리어 전환 마지막 기회"
    desire: "은퇴 자산, 건강"
    allowed_stimulus_level: 3
    keywords_supportive: ["은퇴", "자산방어", "건강", "이직"]
    numeric_range:
      salary_monthly: [600, 1500]
      asset_total: [20000, 200000]

# ----------------------------------------------------------------------------
# 2) 갈등축 (FR-03)
# ----------------------------------------------------------------------------
conflict_axes:
  money:        { weight: 0.30, label: "돈" }
  status:       { weight: 0.20, label: "지위" }
  relationship: { weight: 0.15, label: "관계" }
  time:         { weight: 0.20, label: "시간" }
  self_image:   { weight: 0.15, label: "자기이미지" }

# ----------------------------------------------------------------------------
# 3) 금지 표현 (FR-09 안전성)
#    운영자가 사회 이슈 발생 시 즉시 추가 가능
# ----------------------------------------------------------------------------
banned_expressions:
  - "장애인"
  - "병신"
  - "지잡대"
  - "흙수저"
  - "헬조선"
  - "맘충"
  - "한남"
  - "꼴페미"
  - "급식충"
  - "틀딱"
  - "노예"
  - "자살"
  - "죽어라"

# ----------------------------------------------------------------------------
# 4) CTA 템플릿 풀 (FR-08)
# ----------------------------------------------------------------------------
cta_templates:
  - "당신은 A인가 B인가? 댓글로 이유 한 줄 ㄱㄱ"
  - "주변에 A 고른 사람 vs B 고른 사람, 더 이해 안 가는 쪽은?"
  - "5년 뒤 후회 안 할 선택 댓글로"
  - "A/B 둘 다 싫으면 C 만들어서 댓글 ㄱ"
  - "이게 인생 갈림길이라면 당신은?"
  - "솔직히 누가 더 이득? 댓글로 본인 답"
  - "30대 본인 기준으로 A or B?"
  - "와이프/남편한테 물어보고 댓글 ㄱㄱ"
  - "10년 뒤 본인이 후회할 선택은?"
  - "댓글에서 진짜 답이 나옴"
  - "A 고르면 후회, B 고르면 자책"
  - "둘 중 하나만 골라라 진짜로"
  - "현실적으로 A vs 이상적으로 B"
  - "지금 당신 통장 잔고 기준 A or B?"
  - "팔로워 분들 의견 정말 궁금합니다"
  - "본인 부모님이라면 어떻게 답할까?"
  - "10년 전 본인이라면 A, 지금이라면 B?"
  - "친구한테 추천하기 어려운 쪽은?"
  - "이 선택지 보고 잠 안 오는 사람 손"
  - "결정 못 하겠으면 그게 답"

# ----------------------------------------------------------------------------
# 5) Disclaimer 변형 풀 (FR-10)
# ----------------------------------------------------------------------------
disclaimer_templates:
  - "투자 참고 정보, 권유 아님"
  - "재미로 보는 선택지, 실제 투자 판단은 본인 책임"
  - "Q&A 형식 콘텐츠, 투자 자문 아님"
  - "사고실험용 콘텐츠, 실제 투자 결정 전 전문가 상담"
  - "본 콘텐츠는 정보 제공 목적, 투자 권유 아님"

# ----------------------------------------------------------------------------
# 6) 스코어링 임계값 + 재시도 (FR-04, FR-05)
# ----------------------------------------------------------------------------
viral_score_threshold: 70
max_retry_count: 3
duplicate_block_hours: 24

# ----------------------------------------------------------------------------
# 7) Auto-Pruning 정책
#    측정 시점: 2026-04-26 마스터 결정에 따라 24/48/68/80h
#    grace_period_hours: 첫 측정이 24h이므로 12h → 24h로 정합성 조정
#    min_impressions: 100 → 50 (마스터 결정, 계정 평균 노출 수준 고려)
# ----------------------------------------------------------------------------
auto_delete:
  enabled_mode: "monitor"   # off | monitor | dry_run | full

  # 측정 시점 (발행 후 시간) — 마스터 결정 (2026-04-26)
  measurement_schedule:
    - { hours: 24, label: "첫 측정" }
    - { hours: 48, label: "중간 측정" }
    - { hours: 68, label: "주요 평가" }
    - { hours: 80, label: "폐기 결정" }

  # 폐기 임계값 (80h 시점 기준)
  thresholds:
    min_impressions: 50            # 마스터 결정: 100 → 50 하향
    min_engagement_rate: 0.005
    decision_logic: "AND"          # AND | OR

  # 안전 가드
  safety:
    grace_period_hours: 24         # 측정 시점 24h부터이므로 12 → 24 정합성 조정
    daily_delete_limit: 5
    protect_high_score: 85
    require_manual_review_below: 50

  # engagement_rate 계산식
  engagement_formula:
    numerator: ["like_count", "reply_count", "retweet_count", "quote_count"]
    denominator: "impression_count"

  # 채널별 적용 (Phase 1: X 단독)
  channels:
    x_twitter: true
    telegram: false                # MTProto 도입 전까지 비활성

# ----------------------------------------------------------------------------
# 8) Fallback (NFR-02)
#    YAML 파싱 실패 시 사용. 가장 안전한 보수적 정책.
# ----------------------------------------------------------------------------
fallback:
  segment: "S2_25_29"
  conflict_axis: "money"
  viral_score_threshold: 70
  auto_delete_mode: "off"          # 파싱 실패 시 자동 삭제 절대 비활성
